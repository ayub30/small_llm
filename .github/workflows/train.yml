name: Train and Deploy

on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Train model
        run: python3 train.py

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region eu-west-2 | docker login --username AWS --password-stdin 206218410875.dkr.ecr.eu-west-2.amazonaws.com

      - name: Build and push Docker image
        run: |
          docker buildx build --platform linux/amd64 -t small-llm .
          docker tag small-llm:latest 206218410875.dkr.ecr.eu-west-2.amazonaws.com/small-llm:latest
          docker push 206218410875.dkr.ecr.eu-west-2.amazonaws.com/small-llm:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region eu-west-2 | docker login --username AWS --password-stdin 206218410875.dkr.ecr.eu-west-2.amazonaws.com
            docker pull 206218410875.dkr.ecr.eu-west-2.amazonaws.com/small-llm:latest
            docker stop $(docker ps -q) || true
            docker run -d -p 8000:8000 206218410875.dkr.ecr.eu-west-2.amazonaws.com/small-llm:latest